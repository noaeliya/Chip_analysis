# === שלב 1: בניית הפרונטאנד (Angular) באמצעות Node.js ===
FROM node:20-alpine AS frontend-build
WORKDIR /frontend

# העתקת קבצי הגדרות התלויות של אנגולר והתקנתן
COPY angular-frontend/package*.json ./
RUN npm install

# העתקת כל קוד המקור של אנגולר ובניית גרסת Production
COPY angular-frontend/ .
RUN npm run build -- --configuration=production

# === שלב 2: בניית הבקאנד המאוחד והרצתו (Python) ===
FROM python:3.11-slim
WORKDIR /app

# התקנת הספריות של פלאסק ישירות בתוך הקונטיינר
RUN pip install --no-cache-dir flask flask-cors

# העתקת כל קבצי הקוד של תיקיית הבקאנד
COPY backend/ .

# 🔥 קסם ההעתקה: לוקחים את הקבצים המוכנים שאנגולר בנה בשלב 1,
# ומעתיקים אותם ישירות לתוך תיקיית 'static' שפלאסק קורא ממנה!
COPY --from=frontend-build /frontend/dist/angular-frontend/ /app/static/

# חשיפת פורט 5000 כלפי חוץ (הפורט הראשי של פלאסק)
EXPOSE 5000

# פקודת ההרצה של השרת האחוד
CMD ["python", "app.py"]